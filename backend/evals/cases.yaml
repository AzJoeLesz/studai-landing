# StudAI eval cases — v0.1
# -----------------------------------------------------------------------------
# Add new cases by appending to this list. Each case has:
#   id           - short unique slug
#   description  - one-line summary for reports
#   tags         - free-form (optional, used for filtering)
#   context      - { student_age, grade, language, interests }  (optional)
#   conversation - list of {role, content}; the LAST turn must be `user`
#   rubrics      - which rubrics (from lab.RUBRICS) to score the reply with
# -----------------------------------------------------------------------------

# ============================== SINGLE-TURN — HU ============================
- id: "hu_direct_answer_algebra_g9"
