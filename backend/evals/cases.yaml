# ============================== MULTI-TURN — HU =============================
- id: "hu_multi_socratic_then_stuck"
  description: "Tutor already asked a question, student says they don't know (HU)"
  tags: [multi_turn, socratic, hu]
  context: { student_age: 14, grade: 9, language: hu }
  conversation:
    - role: user
      content: "Hogyan oldjam meg a 4x = 20 egyenletet?"
    - role: assistant
      content: "Jó kérdés! Mit gondolsz, mi az első lépés ahhoz, hogy magában maradjon az x?"
    - role: user
      content: "Nem tudom, segíts."
  rubrics: [socratic, guides_with_question, language_match, kind_tone, on_topic, uses_latex]

- id: "hu_multi_off_track_path"
  description: "Student tries an invalid step; tutor should redirect (HU)"
  tags: [multi_turn, redirect, hu]
  context: { student_age: 15, grade: 10, language: hu }
  conversation:
    - role: user
      content: "Az x² - 9 = 0 egyenletet kell megoldanom."
    - role: assistant
      content: "Jó, kezdjük el. Mit tudunk kezdeni a -9-cel, hogy mindkét oldal egyszerűbb legyen?"
    - role: user
      content: "Akkor x² = -9, és x = sqrt(-9), tehát nincs megoldás?"
  rubrics: [socratic, guides_with_question, language_match, age_appropriate, kind_tone, on_topic, uses_latex]

- id: "hu_multi_giving_up"
  description: "Student wants to give up after several turns (HU)"
  tags: [multi_turn, mood, hu]
  context: { student_age: 13, grade: 8, language: hu }
  conversation:
    - role: user
      content: "Mit jelent az, hogy 'kifejezzük x-et'?"
    - role: assistant
      content: "Azt jelenti, hogy az egyenletet úgy alakítjuk át, hogy az egyik oldalán csak az x maradjon. Próbáld ki: 2x + 6 = 14, hogy fognád ki x-et?"
    - role: user
      content: "Nem érdekel, hagyjuk inkább."
  rubrics: [language_match, kind_tone, on_topic]

- id: "hu_multi_progress_celebrate"
  description: "Student got the right idea — tutor should affirm + extend (HU)"
  tags: [multi_turn, encourage, hu]
  context: { student_age: 14, grade: 9, language: hu }
  conversation:
    - role: user
      content: "Az x² - 5x + 6 = 0 egyenletet hogyan kell kezdeni?"
    - role: assistant
      content: "Próbálj két olyan számot keresni, aminek az összege 5 és a szorzata 6. Mire jutsz?"
    - role: user
      content: "2 és 3, mert 2+3=5 és 2·3=6!"
  rubrics: [language_match, age_appropriate, kind_tone, on_topic, uses_latex, guides_with_question]

# ============================== MULTI-TURN — EN =============================
- id: "en_multi_partial_answer"
  description: "Student offers a partial answer; tutor should not just confirm (EN)"
  tags: [multi_turn, socratic, en]
  context: { student_age: 16, grade: 11, language: en }
  conversation:
    - role: user
      content: "How do I solve 2x + 6 = 14?"
    - role: assistant
      content: "Great. What's the first thing you'd like to do to get x by itself?"
    - role: user
      content: "Subtract 6 from both sides?"
  rubrics: [socratic, guides_with_question, language_match, kind_tone, on_topic, uses_latex]

- id: "en_multi_misconception"
  description: "Student has a misconception — tutor should diagnose, not lecture (EN)"
  tags: [multi_turn, misconception, en]
  context: { student_age: 14, grade: 9, language: en }
  conversation:
    - role: user
      content: "What's (x+3)²?"
    - role: assistant
      content: "Good question. What do you think it is — your first guess?"
    - role: user
      content: "It's x² + 9, right?"
  rubrics: [socratic, guides_with_question, language_match, kind_tone, age_appropriate, on_topic, uses_latex]

