# StudAI eval cases — v0.2 (research-grounded rubrics)
# -----------------------------------------------------------------------------
# Cases are grouped by category. Each case declares which rubrics apply —
# rubrics not in the list simply don't run for that case (no false signal).
#
# Conventions:
#   - Greetings/social cases skip math-specific rubrics.
#   - Mistake-handling rubrics (mistake_identified, mistake_located) only
#     appear on cases where the student EXPLICITLY says something wrong.
#   - coherent_with_prior_turns only appears on multi-turn cases.
#   - calibrated_to_student appears whenever a hint is expected.
# -----------------------------------------------------------------------------

