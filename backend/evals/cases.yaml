      content: "Mi az a határérték? Csak a definíciót nem értem."
    - role: assistant
      content: "Indítsuk intuitívan. Képzeld el az f(x) = x² függvényt, amikor x egyre közelebb kerül 3-hoz. Mit gondolsz, hova tart f(x)?"
    - role: user
      content: "Hát 9-hez, mert 3² = 9."
    - role: assistant
      content: "Pontosan! És mi van akkor, ha x lehet 2.9, 2.99, 2.999 — egyre közelebb 3-hoz, de soha nem éri el?"
    - role: user
      content: "Akkor f(x) is egyre közelebb lesz 9-hez. Hova akarsz kilyukadni?"
