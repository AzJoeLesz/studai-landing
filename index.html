<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudAI – Under Construction</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background: url("background.png") center/cover no-repeat;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(5, 10, 20, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }

    .content {
      max-width: 700px;
      padding: 40px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 30px;
    }

    .logo span {
      color: #8b5cf6;
    }

    h1 {
      font-size: clamp(48px, 8vw, 90px);
      margin: 0 0 20px;
    }

    .sub {
      font-size: 22px;
      color: #d1d5db;
    }

    .tagline {
      margin-top: 30px;
      font-size: 16px;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <main class="overlay">
    <section class="content">
      <div class="logo">Stud<span>AI</span></div>

      <h1>Under Construction</h1>

      <div class="sub">
        Building something new.
      </div>

      <div class="tagline">
        Coming soon.
      </div>
    </section>
  </main>
</body>
</html>
