<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudAI – Under Construction</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background: url("background.png") center/cover no-repeat;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(5, 10, 20, 0.68);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }

    .content {
      max-width: 760px;
      padding: 40px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .logo span {
      color: #8b5cf6;
    }

    h1 {
      font-size: clamp(44px, 8vw, 84px);
      line-height: 1;
      margin: 0 0 24px;
    }

    p {
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.5;
      color: #e5e7eb;
      margin: 0;
    }

    .tagline {
      margin-top: 28px;
      font-size: 16px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>
  <main class="overlay">
    <section class="content">
      <div class="logo">Stud<span>AI</span></div>

      <h1>Under Construction</h1>

      <p>
        We are building a new kind of AI math tutor:
        a real-time teacher that explains while writing.
      </p>

      <div class="tagline">
        Coming soon.
      </div>
    </section>
  </main>
</body>
</html>
