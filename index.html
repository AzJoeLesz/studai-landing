<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudAI – Under Construction</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #4f8cff, #8f5cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 30px;
    }

    .box {
      border: 2px dashed #444;
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
    }

    .emoji {
      font-size: 60px;
      margin-bottom: 20px;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <div class="emoji">🚧</div>
      <h1>StudAI</h1>
      <p>Under Construction</p>
      <p>
        We are building a new kind of AI math tutor.<br />
        A real-time teacher that explains while writing.
      </p>
    </div>

    <footer>
      Coming soon • StudAI
    </footer>
  </div>
</body>
</html>
